<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Timer Challenge</title>

<link rel="stylesheet"
href="css/timer.css">

</head>

<body>

<div class="container">

<header>

<h1>⏱ Timer Challenge</h1>

<p>
Stop the timer exactly at
<b>10.00 Seconds</b>
</p>

</header>

<div class="score-board">

<div class="box">

<h3>Best</h3>

<p id="bestScore">

0.00

</p>

</div>

<div class="box">

<h3>Target</h3>

<p>

10.00

</p>

</div>

</div>

<div class="timer-circle">

<h2 id="timer">

0.00

</h2>

</div>

<div class="buttons">

<button
id="startBtn">

▶ Start

</button>

<button
id="stopBtn">

⏹ Stop

</button>

<button
id="resetBtn">

🔄 Reset

</button>

</div>

<div
id="message"
class="message">

Press Start

</div>

<div class="bottom">

<button
id="backBtn">

⬅ Back To Games

</button>

</div>

</div>

<script src="js/timer.js"></script>

</body>

</html>
